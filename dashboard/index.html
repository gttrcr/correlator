<!DOCTYPE html>
<html>
<script type="text/javascript" src="script.js"></script>
<link rel="stylesheet" href="style.css">
<title>Correlator</title>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

    <h2>Correlator</h2>
    <input type='file' accept='application/json' onchange='openFile(event)'><br>
    <div id='output'></div>
    </br>

    <table id="arguments_table">
        <thead>
            <tr>
                <th>Argument name</th>
                <th>Value</th>
            </tr>
        </thead>
    </table>

    </br>
    <div class="tab">
        <button class="tablinks" onclick="openTab(event, 'Dataset')">Dataset</button>
        <button class="tablinks" onclick="openTab(event, 'Polyfit')">Polyfit</button>
        <button class="tablinks" onclick="openTab(event, 'FFT')">FFT</button>
    </div>

    <div id="Dataset" class="tabcontent">
        <h3>Dataset</h3>
        <p>London is the capital city of England.</p>
        <table id="dataset_table">
            <thead>
                <tr>
                    <th>File name</th>
                    <th>Number of rows</th>
                    <th>Number of columns</th>
                </tr>
            </thead>
        </table>
    </div>

    <div id="Polyfit" class="tabcontent">
        <h3>Polyfit</h3>
        <p>Paris is the capital of France.</p>
    </div>

    <div id="FFT" class="tabcontent">
        <h3>FFT</h3>
        <p>Tokyo is the capital of Japan.</p>
    </div>

</body>

</html>
